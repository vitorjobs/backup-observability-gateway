name: ${OBSERVABILITY_STACK_NAME:-veeam-one-monitoring}

services:
  # api:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: ${API_CONTAINER_NAME:-veeam-one-api}
  #   restart: ${API_RESTART_POLICY:-unless-stopped}
  #   env_file:
  #     - ../.env
  #   environment:
  #     APP_HOST: 0.0.0.0
  #     APP_PORT: ${APP_PORT:-9469}
  #   network_mode: host

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    pull_policy: always
    container_name: ${PROMETHEUS_CONTAINER_NAME:-veeam-one-prometheus}
    restart: ${PROMETHEUS_RESTART_POLICY:-unless-stopped}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    pull_policy: always
    container_name: ${GRAFANA_CONTAINER_NAME:-veeam-one-grafana}
    restart: ${GRAFANA_RESTART_POLICY:-unless-stopped}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/veeam-one-jobs-sre.json
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - observability

networks:
  observability:
    name: ${OBSERVABILITY_NETWORK_NAME:-veeam-one-observability}

volumes:
  prometheus-data:
  grafana-data:
