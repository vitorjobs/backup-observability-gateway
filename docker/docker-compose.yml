name: ${OBSERVABILITY_STACK_NAME:-veeam-one-monitoring}

services:
  api:
    image: ${API_IMAGE:-backup-observability-gateway-v2:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${API_CONTAINER_NAME:-veeam-one-api}
    restart: ${API_RESTART_POLICY:-unless-stopped}
    network_mode: host
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: ${API_HOST_PORT:-9469}

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: ${PROMETHEUS_CONTAINER_NAME:-veeam-one-prometheus}
    restart: ${PROMETHEUS_RESTART_POLICY:-unless-stopped}
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.listen-address=0.0.0.0:9090"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "${PROMETHEUS_HOST_PORT:-19090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - observability

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: ${GRAFANA_CONTAINER_NAME:-veeam-one-grafana}
    restart: ${GRAFANA_RESTART_POLICY:-unless-stopped}
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/Panorama Geral dos Jobs de Backup.json
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - observability

  vitepress:
    image: ${VITEPRESS_IMAGE:-backup-observability-gateway-vitepress:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.vitepress
    container_name: ${VITEPRESS_CONTAINER_NAME:-veeam-one-vitepress}
    restart: ${VITEPRESS_RESTART_POLICY:-unless-stopped}
    ports:
      - "${VITEPRESS_HOST_PORT:-4173}:4173"
    networks:
      - observability

networks:
  observability:
    name: ${OBSERVABILITY_NETWORK_NAME:-veeam-one-observability}

volumes:
  prometheus-data:
    name: ${PROMETHEUS_VOLUME_NAME:-veeam-one-monitoring-prometheus-data}
  grafana-data:
    name: ${GRAFANA_VOLUME_NAME:-veeam-one-monitoring-grafana-data}
