name: Docs CI

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - package.json
      - package-lock.json
      - .github/workflows/docs-ci.yml
      - .github/workflows/docs-deploy.yml
      - .github/pull_request_template.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    env:
      DOCS_BASE_PATH: /backup-observability-gateway/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload docs artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vitepress-docs-${{ github.run_id }}
          path: docs/.vitepress/dist
          retention-days: 7
